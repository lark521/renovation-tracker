<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新房装修支出管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242836;
  --bg4: #2e3344;
  --text: #e8eaf0;
  --text2: #9ca3b4;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --danger: #e74c3c;
  --success: #2ecc71;
  --warning: #f39c12;
  --border: #363b4e;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
/* ---- Header ---- */
.header {
  background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1::before {
  content: "🏠";
  -webkit-text-fill-color: initial;
}
.header-actions { display: flex; gap: 10px; align-items: center; }

/* ---- Buttons ---- */
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #5a4bd1; }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ---- Stats Bar ---- */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 20px 32px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card:nth-child(1)::before { background: var(--accent); }
.stat-card:nth-child(2)::before { background: var(--success); }
.stat-card:nth-child(3)::before { background: var(--warning); }
.stat-card:nth-child(4)::before { background: var(--danger); }
.stat-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* ---- Toolbar ---- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 32px 16px;
  flex-wrap: wrap;
}
.toolbar select, .toolbar input {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  outline: none;
}
.toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
.search-input { flex: 1; min-width: 200px; }

/* ---- Nav Tabs ---- */
.nav-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 32px 0;
  background: var(--bg);
}
.nav-tabs .tab {
  padding: 10px 24px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-tabs .tab:hover {
  background: var(--bg4);
  color: var(--text);
}
.nav-tabs .tab.active {
  background: var(--bg2);
  color: var(--accent2);
  border-bottom: 1px solid var(--bg2);
}

/* ---- List View ---- */
.list-view {
  display: none;
  padding: 0 32px 32px;
}
.list-view.active {
  display: block;
}
.list-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.list-table th {
  background: var(--bg3);
  padding: 10px 16px;
  text-align: left;
  font-weight: 600;
  color: var(--text2);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.list-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.list-table tr:hover td {
  background: var(--bg3);
}
.list-table .amount-cell {
  font-weight: 700;
  color: var(--accent2);
  text-align: right;
}
.list-table .category-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg4);
  color: var(--accent2);
}
.list-table .area-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: rgba(243, 156, 18, 0.15);
  color: #f39c12;
}
.list-summary {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.list-summary-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  flex: 1;
  min-width: 150px;
}
.list-summary-card .label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
}
.list-summary-card .value {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent2);
}

/* ---- Kanban Board ---- */
.board {
  display: flex;
  gap: 16px;
  padding: 0 32px 32px;
  overflow-x: auto;
  min-height: calc(100vh - 340px);
  scroll-behavior: smooth;
  scroll-snap-type: x proximity;
  scrollbar-width: thin;
  scrollbar-color: var(--accent2) transparent;
}
.board::-webkit-scrollbar {
  height: 8px;
}
.board::-webkit-scrollbar-track {
  background: transparent;
}
.board::-webkit-scrollbar-thumb {
  background: var(--accent2);
  border-radius: 4px;
}
.board-scroll-hint {
  flex-shrink: 0;
  padding: 8px 20px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 13px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  transition: opacity 0.3s;
}
.board-scroll-hint.hidden {
  opacity: 0;
  pointer-events: none;
}
.board:empty .board-scroll-hint {
  display: none;
}
.column {
  min-width: 300px;
  max-width: 340px;
  flex-shrink: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 340px);
}
.column-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg2);
  border-radius: var(--radius) var(--radius) 0 0;
  z-index: 1;
}
.column-title {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.column-count {
  background: var(--bg4);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--text2);
}
.column-total {
  font-size: 12px;
  color: var(--text2);
}
.column-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  min-height: 100px;
}
.column-body.drag-over {
  background: rgba(108, 92, 231, 0.08);
  border-radius: 0 0 var(--radius) var(--radius);
}

/* ---- Cards ---- */
.card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
  cursor: grab;
  transition: all 0.2s;
  position: relative;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card:active { cursor: grabbing; }
.card.dragging { opacity: 0.4; transform: rotate(2deg); }
.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.card-amount {
  font-weight: 700;
  color: var(--accent2);
  font-size: 16px;
}
.card-date {
  font-size: 11px;
  color: var(--text2);
}
.card-area {
  font-size: 11px;
  color: var(--warning);
  white-space: nowrap;
}
.card-desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 6px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-priority {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.priority-high { background: rgba(231,76,60,0.2); color: #e74c3c; }
.priority-mid { background: rgba(243,156,18,0.2); color: #f39c12; }
.priority-low { background: rgba(46,204,113,0.2); color: #2ecc71; }
.card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: none;
  gap: 4px;
}
.card:hover .card-actions { display: flex; }
.card-action-btn {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg4);
  color: var(--text2);
  transition: all 0.15s;
}
.card-action-btn:hover { color: var(--text); background: var(--border); }
.card-action-btn.delete:hover { background: var(--danger); color: #fff; }

/* ---- Status Badges ---- */
.status-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.status-pending { background: rgba(243,156,18,0.2); color: #f39c12; }
.status-progress { background: rgba(52,152,219,0.2); color: #3498db; }
.status-done { background: rgba(46,204,113,0.2); color: #2ecc71; }
.status-over { background: rgba(231,76,60,0.2); color: #e74c3c; }

/* ---- Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal h2 {
  font-size: 20px;
  margin-bottom: 24px;
  color: var(--text);
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 600;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

/* ---- Budget Modal ---- */
.budget-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg3);
  border-radius: 8px;
  margin-bottom: 8px;
}
.budget-color {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
#budgetList {
  max-height: 70vh;
  overflow-y: auto;
}
.budget-info { flex: 1; }
.budget-cat-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.budget-bar {
  height: 8px;
  background: var(--bg4);
  border-radius: 4px;
  overflow: hidden;
}
.budget-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.budget-bar-fill.safe { background: var(--success); }
.budget-bar-fill.warn { background: var(--warning); }
.budget-bar-fill.over { background: var(--danger); }
.budget-amounts {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text2);
}
.budget-edit-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 13px;
}
.budget-edit-row .budget-input {
  width: 120px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  color: var(--text);
  font-size: 13px;
}
.budget-edit-row .budget-input:focus {
  border-color: var(--accent2);
  outline: none;
}
.budget-bar-fill.over { background: var(--danger); }
.budget-amounts {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  justify-content: space-between;
}
.budget-input {
  width: 100px;
  background: var(--bg4);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  text-align: right;
}

/* ---- Import area ---- */
.import-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}
.import-area:hover, .import-area.drag-over {
  border-color: var(--accent);
  background: rgba(108, 92, 231, 0.05);
}
.import-icon { font-size: 48px; margin-bottom: 12px; }
.import-text { font-size: 15px; color: var(--text2); }
.import-hint { font-size: 12px; color: var(--text2); margin-top: 8px; opacity: 0.7; }
.import-result {
  padding: 12px 16px;
  border-radius: 8px;
  margin-top: 12px;
  font-size: 14px;
}
.import-result.success { background: rgba(46,204,113,0.15); color: var(--success); }
.import-result.error { background: rgba(231,76,60,0.15); color: var(--danger); }

/* ---- Toast ---- */
.toast-container {
  position: fixed;
  top: 80px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 14px;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
@keyframes slideIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }

/* ---- Category dot ---- */
.cat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* ---- Add Expense Card ---- */
.add-card {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  transition: all 0.2s;
  margin-bottom: 8px;
}
.add-card:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: rgba(108, 92, 231, 0.05);
}
.add-card::before { content: "+ "; font-size: 20px; }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); padding: 16px; }
  .toolbar { padding: 0 16px 12px; }
  .board { padding: 0 16px 16px; }
  .column { min-width: 280px; }
  .header { padding: 12px 16px; }
  .header h1 { font-size: 18px; }
}

/* ---- Charts ---- */
.charts-section {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 0 32px 24px;
}
.chart-card {
  background: var(--bg2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  min-height: 340px;
}
.chart-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 12px;
  text-align: center;
}

@media (max-width: 1200px) {
  .charts-section { grid-template-columns: 1fr; padding: 0 16px 20px; }
  .chart-card { min-height: 280px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>新房装修支出管理系统</h1>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="openImportModal()">📥 导入数据</button>
    <button class="btn btn-outline btn-sm" onclick="openBudgetModal()">💰 预算管理</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">＋ 新增支出</button>
    <button class="btn btn-outline btn-sm" onclick="doLogout()" style="color:var(--danger);border-color:var(--danger);">🚪 注销</button>
  </div>
</div>

<!-- Nav Tabs -->
<div class="nav-tabs">
  <button class="tab active" data-view="board" onclick="switchView('board')">📊 看板</button>
  <button class="tab" data-view="list" onclick="switchView('list')">📋 清单</button>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">总支出</div>
    <div class="stat-value" id="statTotal">¥0</div>
    <div class="stat-sub" id="statCount">0 笔记录</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">预算总额</div>
    <div class="stat-value" id="statBudget">¥0</div>
    <div class="stat-sub" id="statRemaining">剩余 ¥0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">预算使用率</div>
    <div class="stat-value" id="statUsage">0%</div>
    <div class="stat-sub">整体进度</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">分类数</div>
    <div class="stat-value" id="statCategories">0</div>
    <div class="stat-sub">看板分类</div>
  </div>
</div>

<!-- Charts -->
<div class="charts-section">
  <div class="chart-card">
    <h3 class="chart-title">📍 按区域支出</h3>
    <div id="chartArea" style="width:100%;height:320px;"></div>
  </div>
  <div class="chart-card">
    <h3 class="chart-title">📂 按分类支出</h3>
    <div id="chartCategory" style="width:100%;height:360px;"></div>
  </div>
  <div class="chart-card">
    <h3 class="chart-title">👷 人工费用 vs 其他</h3>
    <div id="chartType" style="width:100%;height:320px;"></div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input type="text" class="search-input" placeholder="🔍 搜索项目名称或备注..." id="searchInput" oninput="filterCards()">
  <select id="filterCategory" onchange="filterCards()">
    <option value="">全部分类</option>
  </select>
  <select id="filterStatus" onchange="filterCards()">
    <option value="">全部状态</option>
    <option value="待预算">待预算</option>
    <option value="进行中">进行中</option>
    <option value="已完成">已完成</option>
    <option value="已超支">已超支</option>
  </select>
  <select id="sortBy" onchange="filterCards()">
    <option value="date">按日期排序</option>
    <option value="amount">按金额排序</option>
  </select>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== Global State =====
let allExpenses = [];
let allCategories = [];
let categoryColors = {};
let editingId = null;
let editingCategoryId = null;
let draggedExpenseId = null;

// ===== API Helpers =====
async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  return res.json();
}

// ===== Toast =====
function showToast(msg, type = "success") {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== Modal =====
function openModal(id) { document.getElementById(id).classList.add("active"); }
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

// ===== Load Data =====
async function loadData() {
  const [expRes, catRes, statsRes] = await Promise.all([
    api("/api/expenses"),
    api("/api/categories"),
    api("/api/stats/summary"),
  ]);
  
  allExpenses = expRes.expenses || [];
  allCategories = catRes.categories || [];
  categoryColors = {};
  allCategories.forEach(c => categoryColors[c.name] = c.color);
  
  populateCategoryFilter();
  populateCategorySelect();
  updateListCategories();
  await renderBoard();
  updateStats(statsRes);
  loadCharts();
}

function populateCategoryFilter() {
  const sel = document.getElementById("filterCategory");
  sel.innerHTML = '<option value="">全部分类</option>';
  allCategories.forEach(c => {
    sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
  });
}

function populateCategorySelect() {
  const sel = document.getElementById("expCategory");
  const current = sel.value;
  sel.innerHTML = '<option value="">选择分类</option>';
  allCategories.forEach(c => {
    sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
  });
  if (current) sel.value = current;
}

// ===== Stats =====
function updateStats(stats) {
  document.getElementById("statTotal").textContent = `¥${(stats.total_amount || 0).toLocaleString()}`;
  document.getElementById("statCount").textContent = `${stats.total_items || 0} 笔记录`;
  document.getElementById("statBudget").textContent = `¥${(stats.total_budget || 0).toLocaleString()}`;
  document.getElementById("statRemaining").textContent = `剩余 ¥${(stats.budget_remaining || 0).toLocaleString()}`;
  document.getElementById("statUsage").textContent = `${stats.budget_usage || 0}%`;
  document.getElementById("statCategories").textContent = allCategories.length;
}

// ===== Board Rendering =====
async function renderBoard() {
  const board = document.getElementById("board");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const filterCat = document.getElementById("filterCategory").value;
  const filterStat = document.getElementById("filterStatus").value;
  const sortBy = document.getElementById("sortBy").value;
  
  // Fetch budget data
  let budgetMap = {};
  try {
    const budgetRes = await api("/api/stats/categories");
    (budgetRes.budgets || []).forEach(b => {
      budgetMap[b.category] = b;
    });
  } catch(e) { /* ignore */ }
  
  // Filter
  let filtered = allExpenses.filter(e => {
    if (filterCat && e.category !== filterCat) return false;
    if (filterStat && e.status !== filterStat) return false;
    if (search && !e.title.toLowerCase().includes(search) && !e.description.toLowerCase().includes(search)) return false;
    return true;
  });
  
  // Sort
  if (sortBy === "amount") {
    filtered.sort((a, b) => b.amount - a.amount);
  } else {
    filtered.sort((a, b) => b.date.localeCompare(a.date));
  }
  
  // Group by category
  const groups = {};
  allCategories.forEach(c => { groups[c.name] = []; });
  filtered.forEach(e => {
    if (!groups[e.category]) groups[e.category] = [];
    groups[e.category].push(e);
  });
  
  // Calculate totals per category
  const totals = {};
  allCategories.forEach(c => {
    totals[c.name] = groups[c.name].reduce((s, e) => s + e.amount, 0);
  });
  
  // Render columns
  let html = `<div class="board-scroll-hint">👈 左右滑动查看更多分类列 👉</div>`;
  allCategories.forEach(cat => {
    const expenses = groups[cat.name] || [];
    const color = categoryColors[cat.name] || "#3498db";
    const spent = totals[cat.name];
    const budget = budgetMap[cat.name] || {};
    const totalBudget = budget.total_budget || 0;
    const remaining = totalBudget - spent;
    const remainingClass = remaining < 0 ? "remaining-negative" : remaining <= totalBudget * 0.1 && totalBudget > 0 ? "remaining-warn" : "remaining-ok";
    const remainingText = totalBudget > 0 ? (remaining >= 0 ? `剩 ¥${remaining.toLocaleString()}` : `超 ¥${Math.abs(remaining).toLocaleString()}`) : "";
    const remainingColor = remaining < 0 ? "var(--danger)" : remaining <= totalBudget * 0.1 && totalBudget > 0 ? "var(--warning)" : "var(--success)";
    
    html += `
      <div class="column" data-category="${cat.name}">
        <div class="column-header">
          <div class="column-title">
            <span class="cat-dot" style="background:${color}"></span>
            ${cat.name}
            <span class="column-count">${expenses.length}</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center;">
            <span class="column-total">¥${spent.toLocaleString()}</span>
            <button class="card-action-btn" onclick="editCategory(${cat.id})" title="编辑">✏️</button>
          </div>
          ${totalBudget > 0 ? `<div class="column-budget" style="color:${remainingColor};font-size:12px;margin-top:4px;">${remainingText}</div>` : ""}
        </div>
        <div class="column-body" data-category="${cat.name}"
             ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${cat.name}')"
             ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)">
          ${expenses.map(e => renderCard(e)).join("")}
          <div class="add-card" onclick="openAddModal('${cat.name}')">添加支出</div>
        </div>
      </div>`;
  });
  
  board.innerHTML = html;
}

function renderCard(e) {
  const color = categoryColors[e.category] || "#3498db";
  const priorityClass = e.priority === "高" ? "priority-high" : e.priority === "低" ? "priority-low" : "priority-mid";
  const statusClass = e.status === "已完成" ? "status-done" : e.status === "进行中" ? "status-progress" : e.status === "已超支" ? "status-over" : "status-pending";
  
  return `
    <div class="card" draggable="true" data-id="${e.id}"
         ondragstart="handleDragStart(event, ${e.id})" ondragend="handleDragEnd(event)">
      <div class="card-actions">
        <button class="card-action-btn" onclick="editExpense(${e.id})" title="编辑">✏️</button>
        <button class="card-action-btn delete" onclick="deleteExpense(${e.id})" title="删除">🗑</button>
      </div>
      <div class="card-title">
        <span class="cat-dot" style="background:${color}"></span>
        ${escapeHtml(e.title)}
        <span class="card-priority ${priorityClass}">${e.priority}</span>
      </div>
      <div class="card-meta">
        <span class="card-amount">¥${e.amount.toLocaleString()}</span>
        <span class="card-date">${e.date}</span>
        <span class="card-area" title="区域">📍${e.area || "全屋"}</span>
      </div>
      ${e.description ? `<div class="card-desc">${escapeHtml(e.description)}</div>` : ""}
    </div>`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ===== Filter =====
function filterCards() { renderBoard(); }

// ===== Drag & Drop =====
function handleDragStart(e, id) {
  draggedExpenseId = id;
  e.target.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}
function handleDragEnd(e) { e.target.classList.remove("dragging"); }
function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }
function handleDragEnter(e) {
  e.preventDefault();
  e.currentTarget.classList.add("drag-over");
}
function handleDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }

async function handleDrop(e, category) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if (!draggedExpenseId) return;
  
  // Check if category actually changed
  const expense = allExpenses.find(ex => ex.id === draggedExpenseId);
  if (expense && expense.category === category) return;
  
  try {
    const res = await api("/api/board/move", {
      method: "POST",
      body: JSON.stringify({
        moves: [{ id: draggedExpenseId, category: category }]
      }),
    });
    if (res.results && res.results[0]?.status === "ok") {
      showToast(`已移动至「${category}」`);
      loadData();
    }
  } catch (err) {
    showToast("移动失败", "error");
  }
  draggedExpenseId = null;
}

// ===== Expense CRUD =====
function openAddModal(category) {
  editingId = null;
  document.getElementById("modalTitle").textContent = "新增支出";
  document.getElementById("expenseForm").reset();
  document.getElementById("expDate").value = new Date().toISOString().split("T")[0];
  if (category) document.getElementById("expCategory").value = category;
  openModal("expenseModal");
}

function editExpense(id) {
  const e = allExpenses.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById("modalTitle").textContent = "编辑支出";
  document.getElementById("expenseId").value = id;
  document.getElementById("expTitle").value = e.title;
  document.getElementById("expCategory").value = e.category;
  document.getElementById("expAmount").value = e.amount;
  document.getElementById("expDate").value = e.date;
  document.getElementById("expStatus").value = e.status;
  document.getElementById("expPriority").value = e.priority;
  document.getElementById("expDesc").value = e.description || "";
  document.getElementById("expArea").value = e.area || "全屋";
  openModal("expenseModal");
}

async function saveExpense(e) {
  e.preventDefault();
  const data = {
    title: document.getElementById("expTitle").value.trim(),
    category: document.getElementById("expCategory").value,
    amount: parseFloat(document.getElementById("expAmount").value),
    date: document.getElementById("expDate").value,
    status: document.getElementById("expStatus").value,
    priority: document.getElementById("expPriority").value,
    description: document.getElementById("expDesc").value.trim(),
    area: document.getElementById("expArea").value,
  };
  
  if (editingId) {
    await api(`/api/expenses/${editingId}`, { method: "PUT", body: JSON.stringify(data) });
    showToast("已更新");
  } else {
    await api("/api/expenses", { method: "POST", body: JSON.stringify(data) });
    showToast("已添加");
  }
  
  closeModal("expenseModal");
  loadData();
}

async function deleteExpense(id) {
  if (!confirm("确定删除这条支出记录？")) return;
  await api(`/api/expenses/${id}`, { method: "DELETE" });
  showToast("已删除");
  loadData();
}

// ===== Category Edit =====
function editCategory(catId) {
  editingCategoryId = catId;
  const cat = allCategories.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById("catName").value = cat.name;
  document.getElementById("catColor").value = cat.color;
  document.getElementById("catSort").value = cat.sort_order;
  openModal("categoryModal");
}

async function saveCategory() {
  const data = {
    name: document.getElementById("catName").value.trim(),
    color: document.getElementById("catColor").value,
    sort_order: parseInt(document.getElementById("catSort").value) || 0,
  };
  await api(`/api/categories/${editingCategoryId}`, { method: "PUT", body: JSON.stringify(data) });
  showToast("分类已更新");
  closeModal("categoryModal");
  loadData();
}

// ===== Import =====
function openImportModal() {
  document.getElementById("importResult").innerHTML = "";
  document.getElementById("fileInput").value = "";
  openModal("importModal");
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  importFile(file);
}

// Drag and drop on import area
document.addEventListener("DOMContentLoaded", () => {
  const area = document.getElementById("importArea");
  if (area) {
    area.addEventListener("dragover", (e) => { e.preventDefault(); area.classList.add("drag-over"); });
    area.addEventListener("dragleave", () => area.classList.remove("drag-over"));
    area.addEventListener("drop", (e) => {
      e.preventDefault();
      area.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) importFile(file);
    });
  }
});

async function importFile(file) {
  const resultEl = document.getElementById("importResult");
  resultEl.innerHTML = '<div class="import-result" style="color:var(--accent2)">⏳ 正在导入...</div>';
  
  const formData = new FormData();
  formData.append("file", file);
  
  const res = await fetch("/api/import/csv", { method: "POST", body: formData });
  const data = await res.json();
  
  if (data.imported) {
    resultEl.innerHTML = `<div class="import-result success">✅ ${data.message}</div>`;
    showToast(data.message);
    setTimeout(() => loadData(), 500);
  } else {
    resultEl.innerHTML = `<div class="import-result error">❌ ${data.error || "导入失败"}</div>`;
    showToast(data.error || "导入失败", "error");
  }
}

// ===== Budget Modal =====
async function openBudgetModal() {
  const res = await api("/api/stats/categories");
  const list = document.getElementById("budgetList");
  
  let html = "";
  (res.budgets || []).forEach(b => {
    const color = categoryColors[b.category] || "#3498db";
    const rateClass = b.usage_rate < 70 ? "safe" : b.usage_rate < 100 ? "warn" : "over";
    const pct = Math.min(b.usage_rate, 100);
    const budgetVal = (b.total_budget || 0).toLocaleString();
    html += `
      <div class="budget-item">
        <span class="budget-color" style="background:${color}"></span>
        <div class="budget-info">
          <div class="budget-cat-name">${b.category}</div>
          <div class="budget-bar">
            <div class="budget-bar-fill ${rateClass}" style="width:${pct}%"></div>
          </div>
          <div class="budget-amounts">
            <span>已花 ¥${(b.spent||0).toLocaleString()} / </span>
            <span id="budgetDisplay_${b.category}">¥${budgetVal}</span>
            <span>${b.usage_rate}%</span>
          </div>
          <div class="budget-edit-row">
            <span>预算:</span>
            <input type="number" class="budget-input" data-category="${b.category}" value="${b.total_budget||0}" step="0.01" min="0" placeholder="0">
            <button class="btn btn-sm btn-success" onclick="saveBudget('${b.category}')">保存</button>
            <button class="btn btn-sm btn-outline" onclick="closeBudgetEdit()" style="display:none" id="cancelBudget_${b.category}">取消</button>
          </div>
        </div>
      </div>`;
  });
  
  if (!html) {
    html = '<p style="text-align:center;color:var(--text2);padding:20px">暂无预算数据，请先添加支出记录</p>';
  }
  
  list.innerHTML = html;
  openModal("budgetModal");
}

// ===== Budget Edit =====
async function saveBudget(category) {
  const input = document.querySelector(`.budget-input[data-category="${category}"]`);
  const newVal = parseFloat(input.value);
  if (isNaN(newVal) || newVal < 0) {
    showToast("请输入有效金额", "error");
    return;
  }
  const res = await api("/api/budget/update", {
    method: "PUT",
    body: JSON.stringify({ category, total_budget: newVal }),
  });
  if (res.success) {
    showToast(`「${category}」预算已设为 ¥${newVal.toLocaleString()}`);
    input.parentElement.style.display = "none";
    document.getElementById(`budgetDisplay_${category}`).textContent = `¥${newVal.toLocaleString()}`;
    // Refresh modal content
    openBudgetModal();
  } else {
    showToast(res.error || "更新失败", "error");
  }
}

function closeBudgetEdit() {
  // Just close the edit row and reopen modal to refresh
}

// ===== Init =====
// ===== View Switching =====
let currentView = "board";

function switchView(view) {
  currentView = view;
  document.querySelectorAll(".nav-tabs .tab").forEach(t => {
    t.classList.toggle("active", t.dataset.view === view);
  });
  const board = document.getElementById("board");
  const list = document.getElementById("listView");
  if (view === "board") {
    board.style.display = "flex";
    list.classList.remove("active");
  } else {
    board.style.display = "none";
    list.classList.add("active");
    renderListView();
  }
}

// ===== List View =====
function renderListView() {
  const tbody = document.getElementById("listBody");
  const totalEl = document.getElementById("listTotal");
  const summaryEl = document.getElementById("listSummary");
  
  // Filter by category, area, search
  const catFilter = document.getElementById("listCategory").value;
  const areaFilter = document.getElementById("listArea").value;
  const search = document.getElementById("listSearch").value.toLowerCase();
  
  let filtered = allExpenses.filter(e => {
    if (catFilter && e.category !== catFilter) return false;
    if (areaFilter && e.area !== areaFilter) return false;
    if (search && !e.title.toLowerCase().includes(search)) return false;
    return true;
  });
  
  // Sort by date descending
  filtered.sort((a, b) => b.date.localeCompare(a.date));
  
  // Build summary cards
  const catTotals = {};
  let total = 0;
  for (const e of filtered) {
    total += e.amount;
    catTotals[e.category] = (catTotals[e.category] || 0) + e.amount;
  }
  
  let summaryHtml = `<div class="list-summary-card"><div class="label">总费用</div><div class="value">¥${total.toLocaleString()}</div></div>`;
  summaryHtml += `<div class="list-summary-card"><div class="label">项目数</div><div class="value">${filtered.length}</div></div>`;
  for (const [cat, amt] of Object.entries(catTotals)) {
    summaryHtml += `<div class="list-summary-card"><div class="label">${cat}</div><div class="value">¥${amt.toLocaleString()}</div></div>`;
  }
  summaryEl.innerHTML = summaryHtml;
  
  // Build table
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:40px">暂无匹配数据</td></tr>`;
    totalEl.textContent = "¥0";
    return;
  }
  
  let html = "";
  for (let i = 0; i < filtered.length; i++) {
    const e = filtered[i];
    const color = categoryColors[e.category] || "#3498db";
    const isNeg = e.amount < 0;
    const sign = isNeg ? "-" : "";
    html += `<tr>
      <td style="color:var(--text2)">${i + 1}</td>
      <td>${escapeHtml(e.title)}</td>
      <td><span class="category-badge" style="border-left:3px solid ${color};padding-left:8px">${e.category}</span></td>
      <td><span class="area-badge">📍${e.area || "全屋"}</span></td>
      <td class="amount-cell" style="color:${isNeg ? 'var(--success)' : 'var(--accent2)'}">${sign}¥${Math.abs(e.amount).toLocaleString()}</td>
      <td style="color:var(--text2)">${e.date}</td>
      <td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(e.description || "")}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
  totalEl.textContent = (total < 0 ? "-" : "") + "¥" + Math.abs(total).toLocaleString();
}

// Populate list category filter
function updateListCategories() {
  const sel = document.getElementById("listCategory");
  const current = sel.value;
  const cats = [...new Set(allExpenses.map(e => e.category))].sort();
  sel.innerHTML = '<option value="">全部分类</option>';
  for (const c of cats) {
    sel.innerHTML += `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  initCharts();
  loadData();
  loadCharts();
  // Auto-hide scroll hint on first board scroll
  const hint = document.querySelector('.board-scroll-hint');
  if (hint) {
    let firstScroll = true;
    document.querySelector('.board').addEventListener('scroll', () => {
      if (firstScroll) {
        hint.classList.add('hidden');
        firstScroll = false;
        setTimeout(() => hint.style.display = 'none', 300);
      }
    });
  }
});

function doLogout() {
  fetch('/api/auth/logout', { method: 'POST' }).then(() => {
    location.reload();
  });
}

// ==================== 图表 ====================
let chartArea, chartCategory, chartType;

const chartColors = ['#6c5ce7','#00cec9','#fdcb6e','#e17055','#00b894','#fd79a8','#0984e3','#e84393','#2d3436','#55a973'];

function initCharts() {
  chartArea = echarts.init(document.getElementById('chartArea'));
  chartCategory = echarts.init(document.getElementById('chartCategory'));
  chartType = echarts.init(document.getElementById('chartType'));
}

function makeOption(data, title) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const isMany = data.length > 6;
  return {
    tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
    legend: { bottom: 5, textStyle: { color: '#9ca3b4', fontSize: isMany ? 10 : 12 }, type: 'scroll' },
    series: [{
      name: title,
      type: 'pie',
      radius: ['30%', isMany ? '58%' : '65%'],
      center: ['50%', '45%'],
      avoidLabelOverlap: true,
      padAngle: 2,
      itemStyle: { borderRadius: 4, borderColor: '#1a1d27', borderWidth: 2 },
      label: {
        color: '#e8eaf0',
        fontSize: isMany ? 10 : 12,
        formatter: '{b}\n¥{c}',
        overflow: 'truncate',
        ellipsis: '...',
        show: isMany ? false : true
      },
      labelLine: {
        show: isMany ? false : true,
        lineStyle: { color: '#363b4e' },
        length: 10,
        length2: 10
      },
      labelLayout: { hideOverlap: true },
      emphasis: {
        itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.4)' },
        label: { show: true, fontSize: 13, fontWeight: 'bold' }
      },
      data: data.map((d, i) => ({
        ...d,
        itemStyle: { color: chartColors[i % chartColors.length] },
        label: isMany ? { show: true, fontSize: 10, formatter: '{b}' } : undefined
      }))
    }]
  };
}

async function loadCharts() {
  try {
    const [areaRes, catRes, typeRes] = await Promise.all([
      fetch('/api/charts/by-area'),
      fetch('/api/charts/by-category'),
      fetch('/api/charts/by-type'),
    ]);
    const areaData = await areaRes.json().then(r => r.data);
    const catData = await catRes.json().then(r => r.data);
    const typeData = await typeRes.json().then(r => r.data);
    if (chartArea) chartArea.setOption(makeOption(areaData, '区域'));
    if (chartCategory) chartCategory.setOption(makeOption(catData, '分类'));
    if (chartType) chartType.setOption(makeOption(typeData, '类型'));
  } catch(e) {
    console.error('图表加载失败:', e);
  }
}
