<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 新房装修支出管理系统</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242836;
  --text: #e8eaf0;
  --text2: #9ca3b4;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --danger: #e74c3c;
  --success: #2ecc71;
  --border: #363b4e;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
}
.login-box h1 {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-box p {
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 32px;
}
.form-group {
  margin-bottom: 20px;
  text-align: left;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus {
  border-color: var(--accent);
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.login-btn:hover {
  background: #5a4bd1;
}
.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.error-msg {
  color: var(--danger);
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <h1>🏠 新房装修支出管理</h1>
    <p>请登录以访问管理系统</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">登 录</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  const errorMsg = document.getElementById("errorMsg");
  btn.disabled = true;
  btn.textContent = "登录中...";
  errorMsg.textContent = "";
  
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    
    const data = await res.json();
    
    if (res.ok) {
      window.location.href = "/";
    } else {
      errorMsg.textContent = data.error || "登录失败，请重试";
      btn.disabled = false;
      btn.textContent = "登 录";
    }
  } catch (err) {
    errorMsg.textContent = "网络错误，请检查连接";
    btn.disabled = false;
    btn.textContent = "登 录";
  }
}
</script>
</body>
</html>
